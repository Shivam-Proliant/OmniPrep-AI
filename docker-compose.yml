version: '3.8'
services:
  omniprep-ai:
    build: .
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=secretpassword
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - POSTGRES_USER=omniprep
      - POSTGRES_PASSWORD=omniprep_pass
      - POSTGRES_DB=omniprep_db
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
    depends_on:
      - neo4j
      - postgres

  neo4j:
    image: neo4j:5.9
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    environment:
      NEO4J_AUTH: neo4j/secretpassword

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=omniprep
      - POSTGRES_PASSWORD=omniprep_pass
      - POSTGRES_DB=omniprep_db
    ports:
      - "5432:5432"
    volumes:
      - ./init-scripts:/docker-entrypoint-initdb.d
